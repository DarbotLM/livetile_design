<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT-5 Codex LiveTile Bakeoff</title>
    <style>
        :root {
            --bg: #091018;
            --panel: rgba(17, 25, 37, 0.88);
            --panel-strong: rgba(12, 19, 28, 0.96);
            --tile: rgba(20, 30, 44, 0.84);
            --accent: #4da3ff;
            --accent-soft: rgba(77, 163, 255, 0.18);
            --accent-2: #5cd4a8;
            --border: rgba(255, 255, 255, 0.10);
            --text: #f5f7fb;
            --text-mid: #c3ccdb;
            --text-soft: #8f9ab0;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --grid-gap: 10px;
        }

        body[data-theme="cobalt"] {
            --bg: #091018;
            --panel: rgba(17, 25, 37, 0.88);
            --panel-strong: rgba(12, 19, 28, 0.96);
            --tile: rgba(20, 30, 44, 0.84);
            --accent: #4da3ff;
            --accent-soft: rgba(77, 163, 255, 0.18);
            --accent-2: #5cd4a8;
        }

        body[data-theme="ember"] {
            --bg: #170c0b;
            --panel: rgba(40, 20, 18, 0.88);
            --panel-strong: rgba(26, 13, 12, 0.96);
            --tile: rgba(48, 23, 22, 0.84);
            --accent: #f07a4c;
            --accent-soft: rgba(240, 122, 76, 0.18);
            --accent-2: #ffd166;
        }

        body[data-theme="evergreen"] {
            --bg: #08110d;
            --panel: rgba(13, 30, 22, 0.88);
            --panel-strong: rgba(9, 20, 15, 0.96);
            --tile: rgba(16, 35, 27, 0.84);
            --accent: #33c38e;
            --accent-soft: rgba(51, 195, 142, 0.18);
            --accent-2: #7cd4ff;
        }

        body[data-theme="plum"] {
            --bg: #130d1b;
            --panel: rgba(31, 22, 45, 0.88);
            --panel-strong: rgba(20, 14, 30, 0.96);
            --tile: rgba(38, 28, 54, 0.84);
            --accent: #b47cff;
            --accent-soft: rgba(180, 124, 255, 0.18);
            --accent-2: #64d7ff;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.04), transparent 24%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 18%),
                var(--bg);
            color: var(--text);
        }

        body {
            padding: 12px;
            overflow: hidden;
        }

        .app {
            width: min(1600px, calc(100vw - 24px));
            height: calc(100vh - 24px);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .header,
        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 18px;
            background: var(--panel-strong);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .footer {
            border-top: 1px solid var(--border);
            border-bottom: 0;
            color: var(--text-soft);
            font-size: 12px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.1;
        }

        .title-block p {
            margin: 4px 0 0;
            color: var(--text-soft);
            font-size: 13px;
        }

        .theme-switcher {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .theme-switcher button {
            border: 1px solid var(--border);
            background: var(--tile);
            color: var(--text-mid);
            padding: 8px 10px;
            border-radius: 999px;
            cursor: pointer;
        }

        .theme-switcher button.active {
            color: var(--text);
            border-color: color-mix(in srgb, var(--accent) 55%, white 12%);
            background: var(--accent-soft);
        }

        .main {
            flex: 1;
            display: flex;
            min-height: 0;
            overflow: hidden;
        }

        .canvas-shell {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 40%),
                rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .canvas-stage {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .canvas {
            width: 1280px;
            height: 720px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: var(--grid-gap);
            padding: 14px;
            border-radius: 14px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent),
                linear-gradient(135deg, rgba(255, 255, 255, 0.01), transparent 50%),
                rgba(5, 10, 16, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .inspector {
            width: 340px;
            min-width: 340px;
            min-height: 0;
            padding: 18px;
            border-left: 1px solid var(--border);
            background: var(--panel-strong);
            overflow: auto;
        }

        .inspector h2 {
            margin: 0 0 12px;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        .inspector pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            font-size: 12px;
            line-height: 1.45;
            color: var(--text-mid);
        }

        .template-browser {
            display: flex;
            gap: 12px;
            padding: 14px 18px;
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.18);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .template-thumb {
            min-width: 168px;
            height: 84px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.18);
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 3px;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }

        .template-thumb.active {
            border-color: color-mix(in srgb, var(--accent) 60%, white 10%);
            box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent);
        }

        .template-thumb .mini {
            background: var(--accent-soft);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .template-thumb .label {
            position: absolute;
            left: 8px;
            right: 8px;
            bottom: 6px;
            padding-top: 3px;
            background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.85));
            font-size: 11px;
            color: var(--text);
        }

        .tile {
            position: relative;
            border: 1px solid var(--border);
            border-radius: 12px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent),
                var(--tile);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
            animation: tile-enter 0.45s ease forwards;
            opacity: 0;
        }

        .tile:hover {
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .tile.flipped {
            transform: rotateY(180deg);
        }

        .tile-face {
            position: absolute;
            inset: 0;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backface-visibility: hidden;
        }

        .tile-back {
            transform: rotateY(180deg);
            overflow: auto;
            background: rgba(10, 15, 24, 0.92);
        }

        .tile-back pre {
            margin: 0;
            font-size: 11px;
            color: var(--text-mid);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .tile-label {
            font-size: 11px;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .hero-title {
            font-size: 30px;
            font-weight: 700;
            line-height: 1.05;
        }

        .hero-subtitle {
            font-size: 15px;
            color: var(--text-mid);
            max-width: 720px;
        }

        .hero-badge,
        .pill {
            align-self: flex-start;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 42px;
            font-weight: 700;
            line-height: 1;
        }

        .metric-note {
            font-size: 13px;
            color: var(--text-mid);
        }

        .metric-delta.positive {
            color: var(--accent-2);
        }

        .metric-delta.negative {
            color: #ff8b73;
        }

        .tile table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .tile th,
        .tile td {
            padding: 7px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-align: left;
        }

        .tile th {
            color: var(--text-soft);
            font-weight: 600;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            width: 100%;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-mid);
            font-size: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .pipeline {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            width: 100%;
        }

        .pipeline-step {
            padding: 10px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            font-size: 12px;
        }

        .pipeline-step.active {
            background: var(--accent-soft);
            color: var(--text);
            border-color: color-mix(in srgb, var(--accent) 50%, transparent);
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .spark {
            width: 100%;
            height: 32px;
        }

        @keyframes tile-enter {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

        let currentTemplate = 0;

        function fitCanvas() {
            const stage = document.querySelector('.canvas-stage');
            const canvas = document.getElementById('canvas');
            if (!stage || !canvas) {
                return;
            }
            const scale = Math.min(
                (stage.clientWidth - 4) / 1280,
                (stage.clientHeight - 4) / 720,
                1
            );
            canvas.style.transform = `scale(${scale})`;
            canvas.style.transformOrigin = 'center center';
        }

        function setTheme(themeId) {
            document.body.setAttribute('data-theme', themeId);
            document.querySelectorAll('.theme-switcher button').forEach((button) => {
                button.classList.toggle('active', button.dataset.theme === themeId);
            });
        }

        function sparkline(points) {
            const max = Math.max(...points, 1);
            const min = Math.min(...points, 0);
            const span = max - min || 1;
            const coords = points.map((point, index) => {
                const x = (index / Math.max(points.length - 1, 1)) * 100;
                const y = 28 - ((point - min) / span) * 24;
                return `${x},${y}`;
            }).join(' ');
            return `<svg class="spark" viewBox="0 0 100 32"><polyline points="${coords}" fill="none" stroke="var(--accent)" stroke-width="2"/></svg>`;
        }

        function barChart(data) {
            const max = Math.max(...data.values, 1);
            const step = 220 / Math.max(data.values.length, 1);
            return `
                <div class="tile-label">${data.title}</div>
                <svg viewBox="0 0 260 150">
                    <line x1="20" y1="126" x2="244" y2="126" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                    ${data.values.map((value, index) => {
                        const height = (value / max) * 96;
                        const x = 24 + index * step;
                        return `
                            <rect x="${x}" y="${126 - height}" width="${Math.max(step - 18, 12)}" height="${height}" rx="4" fill="var(--accent)"/>
                            <text x="${x + (Math.max(step - 18, 12) / 2)}" y="142" text-anchor="middle" font-size="10" fill="var(--text-soft)">${data.labels[index]}</text>
                        `;
                    }).join('')}
                </svg>
            `;
        }

        function lineChart(data) {
            const max = Math.max(...data.values, 1);
            const step = 220 / Math.max(data.values.length - 1, 1);
            const points = data.values.map((value, index) => `${20 + index * step},${126 - (value / max) * 96}`).join(' ');
            return `
                <div class="tile-label">${data.title}</div>
                <svg viewBox="0 0 260 150">
                    <line x1="20" y1="126" x2="244" y2="126" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                    <polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="3"/>
                    ${data.values.map((value, index) => `
                        <circle cx="${20 + index * step}" cy="${126 - (value / max) * 96}" r="3.5" fill="var(--accent-2)"/>
                        <text x="${20 + index * step}" y="142" text-anchor="middle" font-size="10" fill="var(--text-soft)">${data.labels[index]}</text>
                    `).join('')}
                </svg>
            `;
        }

        function groupedColumn(data) {
            const max = Math.max(...data.series.flatMap((series) => series.values), 1);
            const groupStep = 220 / Math.max(data.categories.length, 1);
            const barWidth = Math.max((groupStep - 18) / Math.max(data.series.length, 1), 10);
            const palette = ['var(--accent)', 'var(--accent-2)', '#f0b34c'];
            return `
                <div class="tile-label">${data.title}</div>
                <svg viewBox="0 0 260 150">
                    <line x1="20" y1="126" x2="244" y2="126" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                    ${data.categories.map((category, categoryIndex) => `
                        ${data.series.map((series, seriesIndex) => {
                            const height = (series.values[categoryIndex] / max) * 96;
                            const x = 24 + categoryIndex * groupStep + seriesIndex * (barWidth + 2);
                            return `<rect x="${x}" y="${126 - height}" width="${barWidth}" height="${height}" rx="3" fill="${palette[seriesIndex % palette.length]}"/>`;
                        }).join('')}
                        <text x="${24 + categoryIndex * groupStep + (groupStep * 0.35)}" y="142" text-anchor="middle" font-size="10" fill="var(--text-soft)">${category}</text>
                    `).join('')}
                </svg>
                <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text-soft);">
                    ${data.series.map((series, index) => `<span><span class="pill" style="padding:2px 6px;margin-right:4px;">${series.name}</span></span>`).join('')}
                </div>
            `;
        }

        function radarChart(data) {
            const radius = 68;
            const centerX = 96;
            const centerY = 76;
            const points = data.values.map((value, index) => {
                const angle = (index / data.axes.length) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + Math.cos(angle) * (radius * value / 100);
                const y = centerY + Math.sin(angle) * (radius * value / 100);
                return `${x},${y}`;
            }).join(' ');
            const axisLines = data.axes.map((axis, index) => {
                const angle = (index / data.axes.length) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                const labelX = centerX + Math.cos(angle) * 82;
                const labelY = centerY + Math.sin(angle) * 82;
                return `
                    <line x1="${centerX}" y1="${centerY}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
                    <text x="${labelX}" y="${labelY}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="var(--text-soft)">${axis}</text>
                `;
            }).join('');
            return `
                <div class="tile-label">${data.title}</div>
                <svg viewBox="0 0 200 160">
                    <polygon points="${points}" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="2"/>
                    <circle cx="${centerX}" cy="${centerY}" r="${radius}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <circle cx="${centerX}" cy="${centerY}" r="${radius * 0.66}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                    <circle cx="${centerX}" cy="${centerY}" r="${radius * 0.33}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
                    ${axisLines}
                </svg>
            `;
        }

        function pieChart(data) {
            const total = data.segments.reduce((sum, item) => sum + item.value, 0) || 1;
            let angle = -Math.PI / 2;
            const cx = 78;
            const cy = 76;
            const radius = 52;
            const inner = 24;
            const slices = data.segments.map((segment) => {
                const span = (segment.value / total) * Math.PI * 2;
                const nextAngle = angle + span;
                const largeArc = span > Math.PI ? 1 : 0;
                const x1 = cx + Math.cos(angle) * radius;
                const y1 = cy + Math.sin(angle) * radius;
                const x2 = cx + Math.cos(nextAngle) * radius;
                const y2 = cy + Math.sin(nextAngle) * radius;
                const ix2 = cx + Math.cos(nextAngle) * inner;
                const iy2 = cy + Math.sin(nextAngle) * inner;
                const ix1 = cx + Math.cos(angle) * inner;
                const iy1 = cy + Math.sin(angle) * inner;
                const path = `M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${inner} ${inner} 0 ${largeArc} 0 ${ix1} ${iy1} Z`;
                angle = nextAngle;
                return `<path d="${path}" fill="${segment.color}"></path>`;
            }).join('');
            return `
                <div class="tile-label">${data.title}</div>
                <svg viewBox="0 0 240 160">
                    ${slices}
                    <text x="${cx}" y="${cy - 2}" text-anchor="middle" font-size="16" fill="var(--text)">${data.segments[0].value}%</text>
                    <text x="${cx}" y="${cy + 13}" text-anchor="middle" font-size="10" fill="var(--text-soft)">${data.segments[0].label}</text>
                    ${data.segments.map((segment, index) => `
                        <rect x="160" y="${26 + index * 24}" width="10" height="10" rx="2" fill="${segment.color}"></rect>
                        <text x="176" y="${35 + index * 24}" font-size="10" fill="var(--text-mid)">${segment.label} ${segment.value}%</text>
                    `).join('')}
                </svg>
            `;
        }

        function stackedBar(data) {
            const totals = data.labels.map((_, index) => data.segments.reduce((sum, segment) => sum + segment.values[index], 0));
            const max = Math.max(...totals, 1);
            const step = 220 / Math.max(data.labels.length, 1);
            const width = Math.max(step - 20, 12);
            const palette = ['var(--accent)', 'var(--accent-2)', '#f0b34c'];
            return `
                <div class="tile-label">${data.title}</div>
                <svg viewBox="0 0 260 150">
                    <line x1="20" y1="126" x2="244" y2="126" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                    ${data.labels.map((label, labelIndex) => {
                        let y = 126;
                        const bars = data.segments.map((segment, segmentIndex) => {
                            const height = (segment.values[labelIndex] / max) * 96;
                            y -= height;
                            return `<rect x="${24 + labelIndex * step}" y="${y}" width="${width}" height="${height}" rx="3" fill="${palette[segmentIndex % palette.length]}"></rect>`;
                        }).join('');
                        return `${bars}<text x="${24 + labelIndex * step + width / 2}" y="142" text-anchor="middle" font-size="10" fill="var(--text-soft)">${label}</text>`;
                    }).join('')}
                </svg>
            `;
        }

        function renderTileContent(tile) {
            switch (tile.type) {
                case 'hero':
                    return `
                        <div class="tile-label">Hero</div>
                        <div class="hero-title">${tile.data.title}</div>
                        <div class="hero-subtitle">${tile.data.subtitle}</div>
                        <div class="hero-badge">${tile.data.badge}</div>
                    `;
                case 'kpi':
                    return `
                        <div class="tile-label">KPI</div>
                        <div class="metric-value">${tile.data.number}</div>
                        <div class="metric-note">${tile.data.label}</div>
                        <div class="metric-note metric-delta ${tile.data.direction}">Change ${tile.data.delta}</div>
                    `;
                case 'stat-block':
                    return `
                        <div class="tile-label">${tile.data.code}</div>
                        <div class="metric-value">${tile.data.number}</div>
                        <div class="metric-note">${tile.data.label}</div>
                        ${sparkline(tile.data.spark)}
                    `;
                case 'pipeline':
                    return `
                        <div class="tile-label">Pipeline</div>
                        <div class="pipeline">
                            ${tile.data.steps.map((step, index) => `<div class="pipeline-step ${index === tile.data.active ? 'active' : ''}">${step}</div>`).join('')}
                        </div>
                    `;
                case 'status-grid':
                    return `
                        <div class="tile-label">Status</div>
                        <div class="status-grid">
                            ${tile.data.items.map((item) => `
                                <div class="status-item">
                                    <span class="status-dot" style="background:${item.color}"></span>
                                    <span>${item.label}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                case 'data-table':
                    return `
                        <div class="tile-label">Table</div>
                        <table>
                            <thead>
                                <tr>${tile.data.headers.map((header) => `<th>${header}</th>`).join('')}</tr>
                            </thead>
                            <tbody>
                                ${tile.data.rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join('')}</tr>`).join('')}
                            </tbody>
                        </table>
                    `;
                case 'bar-chart':
                    return barChart(tile.data);
                case 'line-chart':
                    return lineChart(tile.data);
                case 'grouped-column':
                    return groupedColumn(tile.data);
                case 'radar-chart':
                    return radarChart(tile.data);
                case 'pie-chart':
                    return pieChart(tile.data);
                case 'stacked-bar':
                    return stackedBar(tile.data);
                default:
                    return `<div class="tile-label">Unknown</div><div class="metric-note">${tile.type}</div>`;
            }
        }

        function renderInspector(template) {
            document.getElementById('json-inspector').textContent = JSON.stringify(template, null, 2);
        }

        function renderTemplate(index) {
            const canvas = document.getElementById('canvas');
            const template = templates[index];
            canvas.innerHTML = '';

            template.layout.forEach((tile, indexInTemplate) => {
                const node = document.createElement('div');
                const [colStart, colEnd, rowStart, rowEnd] = tile.grid.split('/');
                node.className = 'tile';
                node.style.gridColumn = `${colStart} / ${colEnd}`;
                node.style.gridRow = `${rowStart} / ${rowEnd}`;
                node.style.animationDelay = `${indexInTemplate * 45}ms`;

                const front = document.createElement('div');
                front.className = 'tile-face tile-front';
                front.innerHTML = renderTileContent(tile);

                const back = document.createElement('div');
                back.className = 'tile-face tile-back';
                back.innerHTML = `<pre>${JSON.stringify(tile, null, 2)}</pre>`;

                node.appendChild(front);
                node.appendChild(back);
                node.addEventListener('click', () => node.classList.toggle('flipped'));
                canvas.appendChild(node);
            });

            currentTemplate = index;
            renderInspector(template);
            document.getElementById('footer-template').textContent = `Template: ${template.name}`;
            document.getElementById('footer-tiles').textContent = `Tiles: ${template.layout.length}`;
            fitCanvas();

            document.querySelectorAll('.template-thumb').forEach((thumb, thumbIndex) => {
                thumb.classList.toggle('active', thumbIndex === index);
            });
        }

        function renderTemplateBrowser() {
            const rail = document.getElementById('template-browser');
            rail.innerHTML = '';

            templates.forEach((template, index) => {
                const thumb = document.createElement('button');
                thumb.type = 'button';
                thumb.className = 'template-thumb';
                thumb.addEventListener('click', () => renderTemplate(index));

                template.layout.forEach((tile) => {
                    const mini = document.createElement('div');
                    const [colStart, colEnd, rowStart, rowEnd] = tile.grid.split('/');
                    mini.className = 'mini';
                    mini.style.gridColumn = `${colStart} / ${colEnd}`;
                    mini.style.gridRow = `${rowStart} / ${rowEnd}`;
                    thumb.appendChild(mini);
                });

                const label = document.createElement('div');
                label.className = 'label';
                label.textContent = template.name;
                thumb.appendChild(label);
                rail.appendChild(thumb);
            });
        }

        function renderThemeButtons() {
            const rail = document.getElementById('theme-switcher');
            rail.innerHTML = '';
            themes.forEach((theme) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.dataset.theme = theme.id;
                button.textContent = theme.label;
                button.addEventListener('click', () => setTheme(theme.id));
                rail.appendChild(button);
            });
        }

        renderThemeButtons();
        renderTemplateBrowser();
        setTheme('cobalt');
        renderTemplate(0);
        window.addEventListener('resize', fitCanvas);
    </script>
</body>
</html>
