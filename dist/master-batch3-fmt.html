<!DOCTYPE html><html lang="en"><head><title>LiveTile Design Studio</title>
<style>
body{margin:0;padding:0;background:#000;color:#fff;font-family:Arial,sans-serif;}.viewer{width:100%;max-width:1280px;margin:0 auto;}.thumbnails{overflow-x:auto;white-space:nowrap;padding:10px 0;background:#111;}.thumbnail{display:inline-block;width:160px;height:90px;margin:10px;background:#222;cursor:pointer;transition:transform 0.3s;}.thumbnail:hover{transform:scale(1.1);}.thumbnail.active{border:2px solid #fff;}.canvas{display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(7,1fr);width:1280px;height:720px;background:#1a1a1a;overflow:hidden;}.tile{position:relative;overflow:hidden;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.1);animation:fadeIn 0.5s forwards;}@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}.tile.flip:hover{animation:flip 0.6s forwards;}@keyframes flip{0%{transform:perspective(600px) rotateY(0deg);}100%{transform:perspective(600px) rotateY(180deg);}}svg{width:100%;height:100%;}.label{font-size:12px;fill:#fff;}.gridline{stroke:#444;stroke-width:0.5;}.legend{font-size:10px;fill:#fff;}.theme-1{--accent:#3b82f6;}.theme-2{--accent:#10b981;}.theme-3{--accent:#ef4444;}.theme-4{--accent:#8b5cf6;}.theme-5{--accent:#f59e0b;}.theme-6{--accent:#06b6d4;}
</style>

100}}]},{id:23,title:'Fairness Audit',tiles:[{type:'grouped-column',col:'1/7',row:'1/5',data:{groups:['Group1','Group2','Group3','Group4'],series:[{name:'TPR',data:[0.92,0.89,0.91,0.88]},{name:'FPR',data:[0.05,0.06,0.04,0.07]},{name:'Precision',data:[0.94,0.93,0.95,0.92]},{name:'F1',data:[0.93,0.91,0.93,0.90}]},label:'Metric Parity'}},{type:'radar-chart',col:'7/13',row:'1/5',data:{labels:['Statistical Parity','Equal Opportunity','Predictive Parity','Calibration','Individual'],values:[85,90,88,92,87]}},{type:'table',col:'1/9',row:'5/8',data:{headers:['Group','N','TPR','FPR','Precision','Impact'],rows:[['Group1','1000','0.92','0.05','0.94','1.0'],['Group2','800','0.89','0.06','0.93','0.95'],['Group3','1200','0.91','0.04','0.95','1.02'],['Group4','900','0.88','0.07','0.92','0.93']]}},{type:'kpi',col:'9/13',row:'5/7',data:{value:0.87,label:'Disparate Impact'}},{type:'status-grid',col:'9/13',row:'7/8',data:{items:[{label:'Crit1',status:'pass'},{label:'Crit2',status:'fail'},{label:'Crit3',status:'pass'},{label:'Crit4',status:'pass'},{label:'Crit5',status:'fail'}]}}]},{id:24,title:'Token Economics',tiles:[{type:'stacked-bar',col:'1/7',row:'1/5',data:{labels:['GPT-4','Claude','Gemini','Grok'],series:[{name:'Input',data:[200,150,180,120]},{name:'Output',data:[100,80,90,60]},{name:'Cache',data:[50,40,60,30}]},label:'Token Usage'}},{type:'waterfall',col:'7/13',row:'1/5',data:{steps:['Base',100,'+Input',200,'+Output',150,'+Embedding',80,'-Cache',-50,'=Total',480]}},{type:'line-chart',col:'1/7',row:'5/8',data:{series:[{name:'Provider1',data:[0.015,0.014,0.013,0.012,0.011,0.01,0.009,0.008,0.007,0.006,0.005,0.004]},{name:'Provider2',data:[0.018,0.017,0.016,0.015,0.014,0.013,0.012,0.011,0.01,0.009,0.008,0.007]},{name:'Provider3',data:[0.02,0.019,0.018,0.017,0.016,0.015,0.014,0.013,0.012,0.011,0.01,0.009]}],xLabels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],label:'Cost per 1K Tokens'}},{type:'kpi',col:'7/10',row:'5/7',data:{value:'847M',label:'Total Tokens'}},{type:'kpi',col:'10/13',row:'5/7',data:{value:'$0.012',label:'Cost/1K'}},{type:'metric-card',col:'7/10',row:'7/8',data:{value:'$18.4K',label:'Monthly Spend'}},{type:'metric-card',col:'10/13',row:'7/8',data:{value:'-14%',label:'Savings vs Last Month'}}]}];function renderThumbnail(slide,i){const thumb=document.createElement('div');thumb.className=`thumbnail ${themes[i%6]}`;thumb.textContent=slide.title;thumb.onclick=()=>loadSlide(slide);return thumb;}function loadSlide(slide){const canvas=document.getElementById('canvas');canvas.innerHTML='';canvas.className=`canvas ${themes[(slide.id-17)%6]}`;slide.tiles.forEach(t=>{const div=document.createElement('div');div.className='tile flip';div.style.gridColumn=t.col;div.style.gridRow=t.row;renderTile(div,t);canvas.appendChild(div);});}function renderTile(div,t){switch(t.type){case'funnel':div.innerHTML=`<svg viewBox="0 0 100 100"><polygon points="0,0 100,0 80,20 20,20" fill="var(--accent)"/><text x="50" y="10" class="label" text-anchor="middle">${t.data.stages[0]}</text><polygon points="20,20 80,20 70,40 30,40" fill="var(--accent)"/><text x="50" y="30" class="label" text-anchor="middle">${t.data.stages[1]}</text><polygon points="30,40 70,40 60,60 40,60" fill="var(--accent)"/><text x="50" y="50" class="label" text-anchor="middle">${t.data.stages[2]}</text><polygon points="40,60 60,60 55,80 45,80" fill="var(--accent)"/><text x="50" y="70" class="label" text-anchor="middle">${t.data.stages[3]}</text><polygon points="45,80 55,80 52,100 48,100" fill="var(--accent)"/><text x="50" y="90" class="label" text-anchor="middle">${t.data.stages[4]}</text></svg>`;break;case'scatter-plot':div.innerHTML=`<svg viewBox="0 0 100 100"><line x1="10" y1="90" x2="90" y2="90" class="gridline"/><line x1="10" y1="10" x2="10" y2="90" class="gridline"/><text x="50" y="95" class="label" text-anchor="middle">${t.data.xLabel}</text><text x="5" y="50" class="label" transform="rotate(-90 5 50)">${t.data.yLabel}</text>${t.data.points.map((p,i)=>`<circle cx="${10 + (p.x/40)*80}" cy="${90 - (p.y/2000)*80}" r="2" fill="var(--accent)"/>`).join('')}</svg>`;break;case'bar-chart':const maxVal=Math.max(...t.data.values);div.innerHTML=`<svg viewBox="0 0 100 100"><text x="50" y="95" class="label" text-anchor="middle">${t.data.label}</text>${t.data.labels.map((l,i)=>`<rect x="${10 + i*(80/t.data.labels.length)}" y="${90 - (t.data.values[i]/maxVal)*80}" width="${80/t.data.labels.length - 2}" height="${(t.data.values[i]/maxVal)*80}" fill="var(--accent)"/><text x="${10 + i*(80/t.data.labels.length) + (80/t.data.labels.length)/2}" y="95" class="label" text-anchor="middle">${l}</text>`).join('')}</svg>`;break;case'kpi':div.innerHTML=`<div style="text-align:center;font-size:24px;padding:10px;">${t.data.value}<br><span style="font-size:16px;">${t.data.label}</span></div>`;break;case'metric-card':div.innerHTML=`<div style="text-align:center;font-size:20px;padding:10px;">${t.data.value} <span style="color:${t.data.trend==='up'?'green':'red'}">${t.data.trend}</span><br>${t.data.label}</div>`;break;case'heatmap':div.innerHTML=`<svg viewBox="0 0 100 100">${Array.from({length:t.data.rows},(_,r)=>Array.from({length:t.data.cols},(_,c)=>`<rect x="${10 + c*(80/t.data.cols)}" y="${10 + r*(80/t.data.rows)}" width="${80/t.data.cols}" height="${80/t.data.rows}" fill="rgba(59,130,246,${t.data.values[r][c]})"/><text x="${10 + c*(80/t.data.cols) + 40/t.data.cols}" y="${10 + r*(80/t.data.rows) + 40/t.data.rows}" class="label" text-anchor="middle" font-size="8">${t.data.values[r][c].toFixed(2)}</text>`).join('')).join('')}${t.data.labels.map((l,i)=>`<text x="${10 + i*(80/t.data.cols) + 40/t.data.cols}" y="5" class="label" text-anchor="middle" font-size="8">${l}</text><text x="5" y="${10 + i*(80/t.data.rows) + 40/t.data.rows}" class="label" font-size="8">${l}</text>`).join('')}</svg>`;break;case'line-chart':div.innerHTML=`<svg viewBox="0 0 100 100"><text x="50" y="95" class="label" text-anchor="middle">${t.data.label||''}</text>${t.data.series.map((s,j)=>{const points=s.data.map((v,i)=>`${10 + i*(80/s.data.length)},${90 - (v-Math.min(...s.data))/(Math.max(...s.data)-Math.min(...s.data))*80}`);return `<polyline points="${points.join(' ')}" stroke="${['#3b82f6','#10b981','#ef4444'][j]}" fill="none" stroke-width="1"/><text x="90" y="${10 + j*10}" class="legend">${s.name}</text>`;}).join('')}${t.data.xLabels?t.data.xLabels.map((l,i)=>`<text x="${10 + i*(80/t.data.xLabels.length)}" y="95" class="label" font-size="8" text-anchor="middle">${l}</text>`).join(''):''}${t.data.anomalies?t.data.anomalies.map(a=>`<rect x="${10 + a.start*(80/t.data.series[0].data.length)}" y="10" width="${(a.end-a.start)*(80/t.data.series[0].data.length)}" height="80" fill="${a.color}" opacity="0.3"/>`).join(''):''}</svg>`;break;case'radar-chart':const rPoints=t.data.values.map((v,i)=>{const angle= (i/t.data.values.length)*2*Math.PI; return `${50 + 40*(v/100)*Math.cos(angle)},${50 + 40*(v/100)*Math.sin(angle)}`});div.innerHTML=`<svg viewBox="0 0 100 100"><polygon points="${rPoints.join(' ')}" fill="var(--accent)" opacity="0.5" stroke="var(--accent)"/><circle cx="50" cy="50" r="40" stroke="#444" fill="none"/>${t.data.labels.map((l,i)=>{const angle= (i/t.data.labels.length)*2*Math.PI; return `<text x="${50 + 45*Math.cos(angle)}" y="${50 + 45*Math.sin(angle)}" class="label" font-size="8" text-anchor="middle">${l}</text>`;}).join('')}</svg>`;break;case'area-chart':const aMax=Math.max(...[...t.data.actual,...t.data.forecast]);const aPoints=t.data.actual.map((v,i)=>`${i*(100/t.data.actual.length)},${90 - (v/aMax)*80}`);const fPoints=t.data.forecast.map((v,i)=>`${i*(100/t.data.forecast.length)},${90 - (v/aMax)*80}`);div.innerHTML=`<svg viewBox="0 0 100 100"><polyline points="${aPoints.join(' ')}" stroke="#fff" fill="none"/><polygon points="${fPoints.join(' ')} ${fPoints[fPoints.length-1].split(',')[0]},90 ${fPoints[0].split(',')[0]},90" fill="var(--accent)" opacity="0.3"/><polyline points="${fPoints.join(' ')}" stroke="var(--accent)" fill="none"/><rect x="0" y="${90 - (t.data.confidence/aMax)*80}" width="100" height="${(t.data.confidence/aMax)*160}" fill="var(--accent)" opacity="0.1"/><text x="90" y="10" class="legend">Actual</text><text x="90" y="20" class="legend">Forecast</text><text x="50" y="95" class="label">${t.data.label}</text>${t.data.xLabels.map((l,i)=>`<text x="${i*(100/t.data.xLabels.length)}" y="95" class="label" font-size="8">${l}</text>`).join('')}</svg>`;break;case'stat-block':div.innerHTML=`<div style="text-align:center;font-size:18px;padding:10px;">${t.data.value}<br>${t.data.label}</div>`;break;case'histogram':const hMax=Math.max(...t.data.bins);div.innerHTML=`<svg viewBox="0 0 100 100"><text x="50" y="95" class="label">${t.data.label}</text>${t.data.bins.map((v,i)=>`<rect x="${10 + i*(80/t.data.bins.length)}" y="${90 - (v/hMax)*80}" width="${80/t.data.bins.length - 2}" height="${(v/hMax)*80}" fill="var(--accent)"/><text x="${10 + i*(80/t.data.bins.length) + 40/t.data.bins.length}" y="95" class="label" font-size="8" text-anchor="middle">${t.data.labels[i]}</text>`).join('')}</svg>`;break;case'status-grid':div.innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);height:100%;">${t.data.items.map(i=>`<div style="background:${i.status};color:#000;text-align:center;padding:5px;">${i.label}</div>`).join('')}</div>`;break;case'timeline':div.innerHTML=`<svg viewBox="0 0 100 100"><line x1="10" y1="50" x2="90" y2="50" stroke="#fff"/>${t.data.events.map((e,i)=>`<circle cx="${10 + i*(80/(t.data.events.length-1))}" cy="50" r="3" fill="var(--accent)"/><text x="${10 + i*(80/(t.data.events.length-1))}" y="60" class="label" font-size="8" text-anchor="middle">${e.time}</text><text x="${10 + i*(80/(t.data.events.length-1))}" y="40" class="label" font-size="8" text-anchor="middle">${e.label}</text>`).join('')}</svg>`;break;case'grouped-column':const gMax=Math.max(...t.data.series.flatMap(s=>s.data));div.innerHTML=`<svg viewBox="0 0 100 100"><text x="50" y="95" class="label">${t.data.label}</text>${t.data.groups.map((g,gi)=>`${t.data.series.map((s,si)=>`<rect x="${10 + gi*(80/t.data.groups.length) + si*( (80/t.data.groups.length)/t.data.series.length )}" y="${90 - (s.data[gi]/gMax)*80}" width="${(80/t.data.groups.length)/t.data.series.length - 1}" height="${(s.data[gi]/gMax)*80}" fill="${['#3b82f6','#10b981','#ef4444','#8b5cf6'][si]}"/>`).join('')}<text x="${10 + gi*(80/t.data.groups.length) + 40/t.data.groups.length}" y="95" class="label" font-size="8" text-anchor="middle">${g}</text>`).join('')}${t.data.series.map((s,si)=>`<rect x="85" y="${10 + si*10}" width="5" height="5" fill="${['#3b82f6','#10b981','#ef4444','#8b5cf6'][si]}"/><text x="92" y="${15 + si*10}" class="legend" font-size="8">${s.name}</text>`).join('')}</svg>`;break;case'pie-chart':let angle=0;const pieSlices=t.data.values.map(v=>{const slice= (v/t.data.values.reduce((a,b)=>a+b))*360; const path=`M50,50 L${50 + 50*Math.cos(angle*Math.PI/180)},${50 + 50*Math.sin(angle*Math.PI/180)} A50,50 0 ${slice>180?1:0} 1 ${50 + 50*Math.cos((angle+slice)*Math.PI/180)},${50 + 50*Math.sin((angle+slice)*Math.PI/180)} Z`; angle+=slice; return path;});div.innerHTML=`<svg viewBox="0 0 100 100">${pieSlices.map((p,i)=>`<path d="${p}" fill="${['#3b82f6','#10b981','#ef4444','#8b5cf6'][i]}"/>`).join('')}${t.data.labels.map((l,i)=>`<text x="70" y="${20 + i*10}" class="legend">${l}: ${t.data.values[i]}%</text>`).join('')}</svg>`;break;case'table':div.innerHTML=`<table style="width:100%;height:100%;border-collapse:collapse;"> <tr>${t.data.headers.map(h=>`<th style="border:1px solid #444;padding:5px;">${h}</th>`).join('')}</tr> ${t.data.rows.map(r=>`<tr>${r.map(c=>`<td style="border:1px solid #444;padding:5px;">${c}</td>`).join('')}</tr>`).join('')}</table>`;break;case'pipeline':div.innerHTML=`<svg viewBox="0 0 100 100"><line x1="10" y1="50" x2="90" y2="50" stroke="#fff"/>${t.data.stages.map((s,i)=>`<rect x="${10 + i*(80/t.data.stages.length)}" y="40" width="${80/t.data.stages.length - 2}" height="20" fill="var(--accent)"/><text x="${10 + i*(80/t.data.stages.length) + (80/t.data.stages.length)/2}" y="30" class="label" text-anchor="middle" font-size="8">${s}</text>`).join('')}</svg>`;break;case'comparison':div.innerHTML=`<div style="display:flex;height:100%;">${t.data.items.map(i=>`<div style="flex:1;text-align:center;padding:5px;"><h4>${i.name}</h4><p>F1: ${i.metrics.F1}</p><p>Latency: ${i.metrics.Latency}</p><p>Memory: ${i.metrics.Memory}</p></div>`).join('')}</div>`;break;case'progress-ring':const prAngle=t.data.value*3.6;div.innerHTML=`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" stroke="#444" stroke-width="10" fill="none"/><circle cx="50" cy="50" r="45" stroke="var(--accent)" stroke-width="10" fill="none" stroke-dasharray="${prAngle} ${360-prAngle}" transform="rotate(-90 50 50)"/><text x="50" y="55" class="label" text-anchor="middle" font-size="20">${t.data.value}%</text></svg>`;break;case'stacked-bar':const sMax=t.data.series.reduce((a,s)=>a+Math.max(...s.data),0);div.innerHTML=`<svg viewBox="0 0 100 100"><text x="50" y="95" class="label">${t.data.label}</text>${t.data.labels.map((l,li)=>{let stack=0; return t.data.series.map((s,si)=>{const height=(s.data[li]/sMax)*80; const bar=`<rect x="${10 + li*(80/t.data.labels.length)}" y="${90 - stack - height}" width="${80/t.data.labels.length - 2}" height="${height}" fill="${['#3b82f6','#10b981','#ef4444'][si]}"/>`; stack+=height; return bar;}).join('') + `<text x="${10 + li*(80/t.data.labels.length) + 40/t.data.labels.length}" y="95" class="label" font-size="8" text-anchor="middle">${l}</text>`;}).join('')}${t.data.series.map((s,si)=>`<rect x="85" y="${10 + si*10}" width="5" height="5" fill="${['#3b82f6','#10b981','#ef4444'][si]}"/><text x="92" y="${15 + si*10}" class="legend" font-size="8">${s.name}</text>`).join('')}</svg>`;break;case'waterfall':let current=0;const wSteps=t.data.steps.filter((_,i)=>i%2===1).map((v,i)=>{const prev=current; current+=typeof v==='number'?v:0; return {label:t.data.steps[i*2],value:v, cumul:current};});div.innerHTML=`<svg viewBox="0 0 100 100">${wSteps.map((s,i)=>{const sign=s.value>0?'green':'red'; return `<rect x="${10 + i*(80/wSteps.length)}" y="${90 - (Math.abs(s.value)/Math.max(...wSteps.map(ws=>Math.abs(ws.value))))*80}" width="${80/wSteps.length - 2}" height="${(Math.abs(s.value)/Math.max(...wSteps.map(ws=>Math.abs(ws.value))))*80}" fill="${sign}"/><text x="${10 + i*(80/wSteps.length) + 40/wSteps.length}" y="95" class="label" font-size="8" text-anchor="middle">${s.label}</text>`;}).join('')}</svg>`;break;default:div.innerHTML=`<div>${t.type}</div>`;}}const thumbnails=document.getElementById('thumbnails');slides.forEach((s,i)=>{thumbnails.appendChild(renderThumbnail(s,i));});loadSlide(slides[0]);
</script>
