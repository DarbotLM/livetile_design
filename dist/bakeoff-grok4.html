<!DOCTYPE html>
<html lang="en">
<head>
    <title>LiveTile Design Studio</title>
    <style>
        :root {
            --bg: #0a0a1e;
            --card: rgba(20, 25, 40, 0.8);
            --accent: #3b82f6;
            --accentLight: #60a5fa;
            --accentGlow: rgba(59, 130, 246, 0.5);
            --border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --textMid: #d1d5db;
            --textSubtle: #9ca3af;
            transition: all 300ms ease;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        header h1 span {
            font-size: 0.8rem;
            color: var(--textSubtle);
        }

        #theme-switcher {
            display: flex;
            gap: 0.5rem;
        }

        #theme-switcher button {
            padding: 0.5rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            transition: all 300ms;
        }

        #theme-switcher button:hover {
            box-shadow: 0 0 10px var(--accentGlow);
        }

        #template-browser {
            overflow-x: auto;
            white-space: nowrap;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 1rem;
        }

        .thumbnail {
            width: 200px;
            height: 112.5px;
            background: var(--card);
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(7, 1fr);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 300ms;
            position: relative;
        }

        .thumbnail:hover {
            box-shadow: 0 0 10px var(--accentGlow);
            transform: scale(1.05);
        }

        .thumbnail .mini-tile {
            background: var(--accent);
            opacity: 0.3;
            border: 1px solid var(--accentLight);
        }

        .thumbnail-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            text-align: center;
            font-size: 0.7rem;
            padding: 0.2rem;
        }

        main {
            flex: 1;
            display: flex;
            gap: 1rem;
            padding: 1rem;
        }

        #canvas {
            width: 1280px;
            height: 720px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(7, 1fr);
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .tile {
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 300ms;
            position: relative;
            transform-style: preserve-3d;
            animation: enter 500ms ease-out forwards;
            opacity: 0;
        }

        .tile:hover {
            box-shadow: 0 0 10px var(--accentGlow);
        }

        .tile.flipped {
            transform: rotateY(180deg);
        }

        .tile .front, .tile .back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            box-sizing: border-box;
        }

        .tile .back {
            transform: rotateY(180deg);
            background: var(--card);
            overflow: auto;
            font-size: 0.8rem;
            color: var(--textMid);
        }

        .tile .back pre {
            margin: 0;
            white-space: pre-wrap;
            text-align: left;
        }

        @keyframes enter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #json-inspector {
            width: 300px;
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 1rem;
            overflow: auto;
            font-size: 0.9rem;
        }

        #json-inspector details {
            margin-bottom: 0.5rem;
        }

        #json-inspector summary {
            cursor: pointer;
            color: var(--accent);
        }

        #json-inspector .json-key { color: #ff79c6; }
        #json-inspector .json-string { color: #50fa7b; }
        #json-inspector .json-number { color: #bd93f9; }
        #json-inspector .json-boolean { color: #ffb86c; }
        #json-inspector .json-null { color: #ff5555; }

        footer {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            text-align: center;
            color: var(--textSubtle);
        }

        /* Tile Specific Styles */
        .hero h2 { font-size: 32px; margin: 0; }
        .hero p { font-size: 18px; color: var(--textMid); }

        .kpi .number { font-size: 48px; color: var(--accent); }
        .kpi .label { font-size: 14px; color: var(--textSubtle); }
        .kpi .delta { font-size: 12px; color: var(--textMid); display: flex; align-items: center; }
        .kpi .delta.positive { color: #50fa7b; }
        .kpi .delta.negative { color: #ff5555; }

        .chart svg { width: 100%; height: 100%; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .data-table th { background: var(--accent); color: var(--bg); padding: 0.5rem; }
        .data-table td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
        .data-table tr:nth-child(even) { background: rgba(255,255,255,0.05); }

        .pipeline { display: flex; justify-content: space-around; align-items: center; width: 100%; }
        .pipeline .step { background: var(--accent); color: var(--bg); padding: 0.5rem 1rem; border-radius: 4px; }
        .pipeline .connector { width: 20px; height: 2px; background: var(--border); }

        .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .status-grid .item { display: flex; align-items: center; gap: 0.5rem; }
        .status-grid .dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-grid .dot.green { background: #50fa7b; }
        .status-grid .dot.red { background: #ff5555; }
        .status-grid .dot.yellow { background: #ffb86c; }

        .stat-block { display: flex; flex-direction: column; align-items: center; }
        .stat-block .icon { font-size: 24px; }
        .stat-block .number { font-size: 36px; color: var(--accent); }
        .stat-block .label { font-size: 12px; }
        .stat-block .spark { width: 100px; height: 20px; background: rgba(255,255,255,0.1); }

        /* Chart Animations */
        .bar-chart .bar { transform: scaleY(0); transform-origin: bottom; animation: grow 1s ease-out forwards; }
        @keyframes grow { to { transform: scaleY(1); } }

        .line-chart .line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1s ease-out forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        .pie-chart .segment { stroke-dasharray: 0 100; animation: expand 1s ease-out forwards; }
        @keyframes expand { to { stroke-dasharray: 100 0; } }

        /* Additional themes defined in JS */
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>LiveTile Design Studio <span>v1.0</span></h1>
            <div id="theme-switcher"></div>
        </header>
        <div id="template-browser"></div>
        <main>
            <div id="canvas"></div>
            <div id="json-inspector"></div>
        </main>
        <footer>
            <div id="stats"></div>
        </footer>
    </div>
    <script>

        const sampleData = {

            },
            barData: [

                { label: 'Thu', value: 130 },
                { label: 'Fri', value: 160 },
                { label: 'Sat', value: 90 },
                { label: 'Sun', value: 80 }
            ],
            pieData: [
                { label: 'Teams', value: 40 },
                { label: 'Web', value: 30 },
                { label: 'Email', value: 20 },
                { label: 'Other', value: 10 }
            ],
            lineData: [10, 20, 15, 30, 25, 40, 35],
            groupedData: {

                series: [
                    { name: 'Teams', data: [50, 60, 70, 65, 80] },
                    { name: 'Web', data: [40, 50, 55, 50, 60] },

                ]
            },
            radarData: {
                axes: ['Quality', 'Speed', 'Accuracy', 'Satisfaction', 'Efficiency'],

            },
            stackedData: [
                { label: 'Q1', segments: [20, 30, 50] },
                { label: 'Q2', segments: [25, 35, 40] },
                { label: 'Q3', segments: [30, 40, 30] },
                { label: 'Q4', segments: [35, 25, 40] }
            ],
            tableData: [
                { agent: 'John Doe', score: 92, date: '2023-10-01', status: 'Active' },
                { agent: 'Jane Smith', score: 88, date: '2023-10-02', status: 'Active' },
                { agent: 'Bob Johnson', score: 95, date: '2023-10-03', status: 'Inactive' }
            ],
            pipelineSteps: [
                { label: 'Initiate', status: 'complete' },
                { label: 'Process', status: 'in-progress' },
                { label: 'Resolve', status: 'pending' }
            ],
            statusGrid: [
                { label: 'System', status: 'green' },
                { label: 'Network', status: 'yellow' },
                { label: 'Database', status: 'red' },
                { label: 'API', status: 'green' },
                { label: 'Cache', status: 'yellow' },
                { label: 'Queue', status: 'green' }
            ],
            statBlock: { icon: '📊', number: 1247, label: 'Sessions', spark: 'up' }
        };

        const tileRenderers = {
            hero: (div, data) => {
                div.innerHTML = `<h2>${data.title}</h2><p>${data.subtitle}</p><span class="badge" style="background:var(--accent);padding:0.2rem 0.5rem;border-radius:4px;">${data.badge}</span>`;
            },
            kpi: (div, data) => {
                const deltaClass = data.positive ? 'positive' : 'negative';
                const arrow = data.positive ? '↑' : '↓';
                div.innerHTML = `<div class="number">${data.value}</div><div class="label">${data.label}</div><div class="delta ${deltaClass}">${arrow} ${data.delta}</div>`;
            },
            bar: (div, data) => {
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 300 200');
                const max = Math.max(...data.map(d => d.value));
                data.forEach((d, i) => {
                    const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    bar.classList.add('bar');
                    bar.setAttribute('x', i * 40 + 10);
                    bar.setAttribute('y', 200 - (d.value / max * 180));
                    bar.setAttribute('width', 30);
                    bar.setAttribute('height', d.value / max * 180);
                    bar.setAttribute('fill', 'var(--accent)');
                    svg.appendChild(bar);
                    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', i * 40 + 25);
                    label.setAttribute('y', 195);
                    label.setAttribute('fill', 'var(--textSubtle)');
                    label.setAttribute('font-size', '10');
                    label.textContent = d.label;
                    svg.appendChild(label);
                });
                div.appendChild(svg);
                div.classList.add('chart', 'bar-chart');
            },
            pie: (div, data) => {
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '-1 -1 2 2');
                const total = data.reduce((sum, d) => sum + d.value, 0);
                let start = 0;
                data.forEach((d, i) => {
                    const angle = (d.value / total) * 2 * Math.PI;
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.classList.add('segment');
                    path.setAttribute('d', `M ${Math.cos(start)} ${Math.sin(start)} A 1 1 0 0 1 ${Math.cos(start + angle)} ${Math.sin(start + angle)} L 0 0`);
                    path.setAttribute('fill', `hsl(${i * 90}, 70%, 50%)`);
                    svg.appendChild(path);
                    start += angle;
                });
                div.appendChild(svg);
                div.classList.add('chart', 'pie-chart');
            },
            line: (div, data) => {
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 300 200');
                const points = data.map((v, i) => `${i * 50},${200 - v * 2}`);
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                line.classList.add('line');
                line.setAttribute('points', points.join(' '));
                line.setAttribute('fill', 'none');
                line.setAttribute('stroke', 'var(--accent)');
                line.setAttribute('stroke-width', '2');
                svg.appendChild(line);
                div.appendChild(svg);
                div.classList.add('chart', 'line-chart');
            },
            grouped: (div, data) => {
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 300 200');
                const max = Math.max(...data.series.flatMap(s => s.data));
                data.categories.forEach((cat, i) => {
                    data.series.forEach((ser, j) => {
                        const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        bar.classList.add('bar');
                        bar.setAttribute('x', i * 60 + j * 15 + 10);
                        bar.setAttribute('y', 200 - (ser.data[i] / max * 180));
                        bar.setAttribute('width', 12);
                        bar.setAttribute('height', ser.data[i] / max * 180);
                        bar.setAttribute('fill', `hsl(${j * 120}, 70%, 50%)`);
                        svg.appendChild(bar);
                    });
                });
                div.appendChild(svg);
                div.classList.add('chart', 'grouped-chart');
            },
            radar: (div, data) => {
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '-150 -150 300 300');
                const points = data.values.map((v, i) => {
                    const angle = i * (2 * Math.PI / data.axes.length);
                    return `${Math.cos(angle) * v} ${Math.sin(angle) * v}`;
                }).join(' ');
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                poly.setAttribute('points', points);
                poly.setAttribute('fill', 'rgba(59,130,246,0.3)');
                poly.setAttribute('stroke', 'var(--accent)');
                svg.appendChild(poly);
                div.appendChild(svg);
                div.classList.add('chart', 'radar-chart');
            },
            stacked: (div, data) => {
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 300 200');
                data.forEach((d, i) => {
                    let y = 200;
                    d.segments.forEach((seg, j) => {
                        const height = seg / 100 * 180;
                        const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        bar.classList.add('bar');
                        bar.setAttribute('x', i * 60 + 10);
                        bar.setAttribute('y', y - height);
                        bar.setAttribute('width', 40);
                        bar.setAttribute('height', height);
                        bar.setAttribute('fill', `hsl(${j * 120}, 70%, 50%)`);
                        svg.appendChild(bar);
                        y -= height;
                    });
                });
                div.appendChild(svg);
                div.classList.add('chart', 'stacked-chart');
            },
            table: (div, data) => {
                const table = document.createElement('table');
                table.classList.add('data-table');
                table.innerHTML = `<thead><tr><th>Agent</th><th>Score</th><th>Date</th><th>Status</th></tr></thead><tbody>${data.map(row => `<tr><td>${row.agent}</td><td>${row.score}</td><td>${row.date}</td><td>${row.status}</td></tr>`).join('')}</tbody>`;
                div.appendChild(table);
            },
            pipeline: (div, data) => {
                const pipe = document.createElement('div');
                pipe.classList.add('pipeline');
                data.forEach((step, i) => {
                    const s = document.createElement('div');
                    s.classList.add('step');
                    s.textContent = step.label;
                    pipe.appendChild(s);
                    if (i < data.length - 1) {
                        const conn = document.createElement('div');
                        conn.classList.add('connector');
                        pipe.appendChild(conn);
                    }
                });
                div.appendChild(pipe);
            },
            status: (div, data) => {
                const grid = document.createElement('div');
                grid.classList.add('status-grid');
                data.forEach(item => {
                    const it = document.createElement('div');
                    it.classList.add('item');
                    it.innerHTML = `<div class="dot ${item.status}"></div>${item.label}`;
                    grid.appendChild(it);
                });
                div.appendChild(grid);
            },
            stat: (div, data) => {
                div.classList.add('stat-block');
                div.innerHTML = `<div class="icon">${data.icon}</div><div class="number">${data.number}</div><div class="label">${data.label}</div><div class="spark">${data.spark}</div>`;
            }
        };

        const templates = [

                ]
            },
            {

                    { type: 'kpi', col: '1/4', row: '2/4', data: sampleData.kpis.sessions },
                    { type: 'kpi', col: '4/7', row: '2/4', data: sampleData.kpis.resolution },
                    { type: 'kpi', col: '7/10', row: '2/4', data: sampleData.kpis.response },

            },
            {

                    { type: 'line', col: '1/7', row: '2/6', data: sampleData.lineData },

                    { type: 'kpi', col: '1/4', row: '6/8', data: sampleData.kpis.sessions },
                    { type: 'kpi', col: '4/7', row: '6/8', data: sampleData.kpis.csat }
                ]
            },
            {

                tiles: [

            {

                    { type: 'grouped', col: '1/7', row: '2/6', data: sampleData.groupedData },
                    { type: 'line', col: '7/13', row: '2/6', data: sampleData.lineData },
                    { type: 'pie', col: '1/7', row: '6/8', data: sampleData.pieData }
                ]
            },
            {
                name: 'Executive Brief',
                tiles: [
                    { type: 'hero', col: '1/13', row: '1/2', data: { title: 'Executive Summary', subtitle: 'Key Facts and Comparisons', badge: 'Brief' } },
                    { type: 'stacked', col: '1/7', row: '2/6', data: sampleData.stackedData },
                    { type: 'stat', col: '7/10', row: '2/4', data: sampleData.statBlock },
                    { type: 'table', col: '7/13', row: '4/8', data: sampleData.tableData },
                    { type: 'kpi', col: '1/4', row: '6/8', data: sampleData.kpis.sessions }
                ]
            }
        ];

        function setTheme(index) {
            const theme = themes[index];
            const root = document.documentElement;
            Object.entries(theme.vars).forEach(([key, value]) => {
                root.style.setProperty(key, value);
            });
        }

        function createThumbnail(template, index) {
            const thumb = document.createElement('div');
            thumb.classList.add('thumbnail');
            template.tiles.forEach(tile => {
                const mini = document.createElement('div');
                mini.classList.add('mini-tile');
                mini.style.gridColumn = tile.col;
                mini.style.gridRow = tile.row;
                thumb.appendChild(mini);
            });
            const label = document.createElement('div');
            label.classList.add('thumbnail-label');
            label.textContent = template.name;
            thumb.appendChild(label);
            thumb.addEventListener('click', () => loadTemplate(index));
            return thumb;
        }

        function loadTemplate(index) {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            const template = templates[index];
            template.tiles.forEach((tile, i) => {
                const tileDiv = document.createElement('div');
                tileDiv.classList.add('tile', tile.type);
                tileDiv.style.gridColumn = tile.col;
                tileDiv.style.gridRow = tile.row;
                tileDiv.style.animationDelay = `${(parseInt(tile.row.split('/')[0]) + parseInt(tile.col.split('/')[0])) * 50}ms`;

                const front = document.createElement('div');
                front.classList.add('front');
                tileRenderers[tile.type](front, tile.data);

                const back = document.createElement('div');
                back.classList.add('back');
                back.innerHTML = `<pre>${JSON.stringify(tile, null, 2)}</pre>`;

                tileDiv.appendChild(front);
                tileDiv.appendChild(back);

                tileDiv.addEventListener('click', () => tileDiv.classList.toggle('flipped'));

                canvas.appendChild(tileDiv);
            });
            renderJSONInspector(template);
            updateStats(template.tiles.length, themes.length, templates.length);
        }

        function renderJSONInspector(template) {
            const inspector = document.getElementById('json-inspector');
            inspector.innerHTML = '';
            inspector.appendChild(renderJSON(template));
        }

        function renderJSON(obj) {
            if (typeof obj !== 'object' || obj === null) {
                const span = document.createElement('span');
                if (typeof obj === 'string') span.classList.add('json-string');
                else if (typeof obj === 'number') span.classList.add('json-number');
                else if (typeof obj === 'boolean') span.classList.add('json-boolean');
                else span.classList.add('json-null');
                span.textContent = JSON.stringify(obj);
                return span;
            }

            const details = document.createElement('details');
            const summary = document.createElement('summary');
            summary.textContent = Array.isArray(obj) ? '[' : '{';
            details.appendChild(summary);

            Object.entries(obj).forEach(([key, value]) => {
                const div = document.createElement('div');
                const keySpan = document.createElement('span');
                keySpan.classList.add('json-key');
                keySpan.textContent = `${JSON.stringify(key)}: `;
                div.appendChild(keySpan);
                div.appendChild(renderJSON(value));
                details.appendChild(div);
            });

            const close = document.createElement('div');
            close.textContent = Array.isArray(obj) ? ']' : '}';
            details.appendChild(close);

            return details;
        }

        function updateStats(tiles, themesCount, templatesCount) {
            const stats = document.getElementById('stats');
            stats.innerHTML = `Tiles: ${tiles} | Themes: ${themesCount} | Templates: ${templatesCount}`;
        }

        // Initialize
        (function init() {
            const switcher = document.getElementById('theme-switcher');
            themes.forEach((theme, i) => {
                const btn = document.createElement('button');
                btn.textContent = theme.name;
                btn.addEventListener('click', () => setTheme(i));
                switcher.appendChild(btn);
            });

            const browser = document.getElementById('template-browser');
            templates.forEach((template, i) => {
                browser.appendChild(createThumbnail(template, i));
            });

            setTheme(0);
            loadTemplate(0);
        })();
    </script>
</body>
</html>
