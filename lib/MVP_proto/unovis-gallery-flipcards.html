<style>
:root {
  color-scheme: light dark;
  --font-sans: "Segoe UI", Inter, system-ui, sans-serif;
  --font-mono: Consolas, "SFMono-Regular", "Cascadia Code", monospace;
  --bg: #f6f8fc;
  --bg-accent: rgba(14, 165, 233, 0.10);
  --surface: #ffffff;
  --surface-2: #edf2f8;
  --surface-3: #e2e8f0;
  --text: #0f172a;
  --text-dim: #475569;
  --text-soft: #64748b;
  --border: rgba(15, 23, 42, 0.10);
  --border-bright: rgba(15, 23, 42, 0.22);
  --shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
  --shadow-hover: 0 8px 30px rgba(15, 23, 42, 0.12);
  --focus: #0284c7;
  --back-bg: #0f172a;
  --back-text: #dbeafe;
  --back-text-dim: #93c5fd;
  --back-border: rgba(147, 197, 253, 0.20);
  --back-header: rgba(15, 23, 42, 0.50);
  --code: #86efac;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #07111f;
    --bg-accent: rgba(56, 189, 248, 0.10);
    --surface: #0f172a;
    --surface-2: #162235;
    --surface-3: #1e293b;
    --text: #e2e8f0;
    --text-dim: #cbd5e1;
    --text-soft: #94a3b8;
    --border: rgba(148, 163, 184, 0.14);
    --border-bright: rgba(148, 163, 184, 0.28);
    --shadow: 0 4px 20px rgba(2, 6, 23, 0.30);
    --shadow-hover: 0 8px 30px rgba(2, 6, 23, 0.45);
    --focus: #38bdf8;
    --back-bg: #020617;
    --back-text: #dbeafe;
    --back-text-dim: #7dd3fc;
    --back-border: rgba(125, 211, 252, 0.20);
    --back-header: rgba(2, 6, 23, 0.50);
    --code: #bbf7d0;
  }
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: var(--font-sans);
  background:
    radial-gradient(circle at top left, var(--bg-accent), transparent 34%),
    radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.08), transparent 28%),
    var(--bg);
  color: var(--text);
}
a { color: inherit; }

/* Page layout */
.page { max-width: 1440px; margin: 0 auto; padding: 28px 20px 72px; }
.page-header { display: grid; gap: 18px; margin-bottom: 26px; }
.title-block { display: grid; gap: 8px; }
.title-block h1 { margin: 0; font-size: clamp(28px, 4vw, 42px); line-height: 1.05; letter-spacing: -0.03em; }
.subtitle { margin: 0; max-width: 920px; color: var(--text-dim); font-size: 15px; line-height: 1.6; }
.source-line { color: var(--text-soft); font-size: 13px; }
.source-line a { color: var(--focus); text-decoration: none; }
.source-line a:hover, .source-line a:focus-visible { text-decoration: underline; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow); }
.stat-value { display: block; font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
.stat-label { display: block; margin-top: 4px; font-size: 11px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.08em; }

/* Controls */
.controls { display: grid; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; box-shadow: var(--shadow); }
.controls-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.search { flex: 1 1 320px; min-width: 240px; appearance: none; border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; background: var(--surface-2); color: var(--text); font: inherit; }
.search:focus { outline: 2px solid var(--focus); outline-offset: 2px; }
.search-help { font-size: 13px; color: var(--text-soft); }

/* Filter chips */
.chip-bar { display: flex; flex-wrap: wrap; gap: 8px; }
.filter-chip {
  appearance: none; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-dim);
  border-radius: 999px; padding: 8px 12px; font: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s;
}
.filter-chip:hover, .filter-chip:focus-visible { transform: translateY(-1px); border-color: var(--focus); }
.filter-chip[aria-pressed="true"] {
  background: var(--chip-soft, rgba(14, 165, 233, 0.14));
  color: var(--chip-solid, var(--focus));
  border-color: var(--chip-solid, var(--focus));
}

/* Collections */
.collections { display: grid; gap: 28px; }
.collection { display: grid; gap: 16px; }
.collection-header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 14px; align-items: flex-start; }
.collection-title-wrap { display: grid; gap: 6px; }
.collection-title { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.collection-title h2 { margin: 0; font-size: clamp(22px, 3vw, 30px); letter-spacing: -0.03em; }
.collection-marker { width: 12px; height: 12px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 0 5px var(--accent-soft); flex: 0 0 auto; }
.collection-desc { margin: 0; max-width: 840px; color: var(--text-dim); font-size: 14px; line-height: 1.6; }
.collection-desc a { color: var(--accent); text-decoration: none; }
.collection-desc a:hover, .collection-desc a:focus-visible { text-decoration: underline; }
.collection-count { border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow); border-radius: 999px; padding: 10px 14px; color: var(--text-dim); font-size: 12px; white-space: nowrap; }

/* -- Flip Card (proven pattern from flipcard-pattern-library) -- */
.flip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.flip-card { perspective: 1000px; cursor: pointer; position: relative; outline: none; }
.flip-card:focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; border-radius: 14px; }
.flip-inner { position: relative; width: 100%; min-height: 380px; transition: transform 0.5s ease; transform-style: preserve-3d; }
.flip-card[aria-pressed="true"] .flip-inner { transform: rotateY(180deg); }
.flip-front, .flip-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; }
.flip-front { background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); }
.flip-front:hover { border-color: var(--border-bright); box-shadow: var(--shadow-hover); }
.flip-back { transform: rotateY(180deg); background: var(--back-bg); border: 1px solid var(--back-border); color: var(--back-text); }

/* Card header */
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.flip-back .card-header { border-bottom-color: var(--back-border); }
.card-badge {
  display: inline-flex; align-items: center; gap: 6px; max-width: 80%; min-width: 0;
  padding: 5px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent);
}
.card-badge span:last-child { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.flip-hint { font-size: 10px; color: var(--text-soft); opacity: 0; transition: opacity 0.15s; white-space: nowrap; }
.flip-card:hover .flip-hint, .flip-card:focus-visible .flip-hint { opacity: 1; }
.flip-back .flip-hint { opacity: 1; color: var(--back-text-dim); }

/* Hero illustration area */
.card-hero {
  position: relative;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, var(--accent-soft), transparent 70%), var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100px;
}
.card-hero svg { display: block; width: 100%; max-width: 260px; height: 80px; }

/* Front body */
.front-body { display: flex; flex-direction: column; gap: 10px; padding: 14px; flex: 1 1 auto; }
.example-title { margin: 0; font-size: 18px; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }
.example-path {
  display: inline-flex; align-items: center; align-self: start; max-width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: var(--font-mono); font-size: 11px;
  background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 999px;
}

/* KPI-style meta rows */
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
.meta-cell { display: flex; flex-direction: column; gap: 2px; }
.meta-cell-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-soft); }
.meta-cell-value { font-size: 14px; font-weight: 600; color: var(--text); }

/* Mini bar indicator */
.position-bar { display: flex; gap: 3px; align-items: center; margin-top: 2px; }
.position-pip { width: 100%; max-width: 28px; height: 5px; border-radius: 3px; background: var(--surface-3); }
.position-pip.active { background: var(--accent); }

/* Language badges */
.lang-row { display: flex; flex-wrap: wrap; gap: 4px; }
.lang-badge {
  font-family: var(--font-mono); font-size: 9px; font-weight: 600; padding: 2px 7px;
  border-radius: 5px; text-transform: uppercase; letter-spacing: 0.04em;
  background: var(--surface-3); color: var(--text-dim); border: 1px solid var(--border);
}

/* Action links */
.link-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 6px; }
.card-link, .back-link, .copy-btn {
  appearance: none; border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
  border-radius: 8px; padding: 8px 12px; font: inherit; font-size: 11px; font-weight: 600;
  text-decoration: none; cursor: pointer; transition: transform 0.18s, border-color 0.18s;
}
.card-link:hover, .card-link:focus-visible, .back-link:hover, .back-link:focus-visible,
.copy-btn:hover, .copy-btn:focus-visible { transform: translateY(-1px); border-color: var(--focus); }
.flip-back .back-link, .flip-back .copy-btn { background: var(--back-header); color: var(--back-text); border-color: var(--back-border); }
.flip-back .copy-btn[data-state="copied"] { color: var(--code); border-color: var(--code); }

/* Back body */
.back-body { display: flex; flex-direction: column; gap: 10px; flex: 1 1 auto; min-height: 0; padding: 12px 14px; }
.back-title { font-size: 13px; font-weight: 700; color: var(--back-text); }
.back-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.back-copy-row { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
.schema-controls { display: grid; gap: 8px; flex: 1 1 auto; min-width: 0; }
.schema-picker { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.schema-label { font-size: 11px; color: var(--back-text-dim); font-weight: 600; white-space: nowrap; }
.schema-select {
  min-width: 180px; max-width: 100%;
  appearance: none; border: 1px solid var(--back-border); border-radius: 8px;
  background: var(--back-header); color: var(--back-text);
  font: inherit; font-size: 11px; padding: 8px 10px;
}
.schema-select:focus { outline: 2px solid var(--focus); outline-offset: 2px; }
.schema-summary { font-size: 11px; line-height: 1.5; color: var(--back-text-dim); }
.json-block {
  margin: 0; padding: 12px; flex: 1 1 auto; min-height: 0; overflow: auto;
  border: 1px solid var(--back-border); border-radius: 12px; background: rgba(2, 6, 23, 0.42);
  color: var(--code); font-family: var(--font-mono); font-size: 11px; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
}

/* Empty / Footer */
.empty-state { border: 1px dashed var(--border); background: var(--surface); border-radius: 16px; padding: 22px; text-align: center; color: var(--text-dim); box-shadow: var(--shadow); }
.page-footer { margin-top: 32px; color: var(--text-soft); font-size: 12px; line-height: 1.6; }
.hidden { display: none !important; }

@media (max-width: 760px) {
  .page { padding-inline: 14px; }
  .controls { padding: 14px; }
  .flip-grid { grid-template-columns: 1fr; }
  .flip-inner { min-height: 360px; }
  .meta-grid { grid-template-columns: 1fr; }
}
</style>

function esc(v) {
  return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function slugify(v) {
  return String(v).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
}

function prettyJson(value) {
  return JSON.stringify(value, null, 2);
}

function totalExamples() {
  return COLLECTIONS.reduce((s, c) => s + c.examples.length, 0);
}

function galleryUrl(col, title) {
  return GALLERY_VIEW_URL + "?collection=" + encodeURIComponent(col) + "&title=" + encodeURIComponent(title);

function sourceUrl(p) { return SOURCE_BASE + "/" + p; }

function sampleUrl(p) { return ADAPTIVE_CARDS_RAW_BASE + "/" + p; }

function liveTileGrid(ci, ei) {
  return {
    col: (ei % 3) * 4 + 1,
    row: Math.floor(ei / 3) * 2 + 1,
    colSpan: 4,
    rowSpan: 2
  };
}

function patternLinks(ex) {
  const links = [{ label: "Pattern Library", url: PATTERN_LIBRARY_PAGE }];
  if (ex.referenceUrl) links.push({ label: ex.referenceLabel || "Reference", url: ex.referenceUrl });
  return links;
}

function buildMetadata(col, ex, ci, ei) {
  const kind = ex.kind || "unovis";
  const isPattern = kind === "pattern";
  const pathLabel = ex.pathLabel || ex.pathname;
  const implementationLanguages = ex.languages || (isPattern ? DEFAULT_PATTERN_LANGS : DEFAULT_UNOVIS_LANGS);
  const links = isPattern
    ? patternLinks(ex)
    : [
        { label: "Gallery", url: galleryUrl(col.title, ex.title) },
        { label: "Source", url: sourceUrl(ex.pathname) }
      ];
  return {
    kind,
    collection: col.title,
    title: ex.title,
    pathname: ex.pathname,
    path_label: pathLabel,
    description: ex.desc,
    ordinal_in_collection: ei + 1,
    collection_size: col.examples.length,
    collection_index: ci + 1,
    source: isPattern
      ? {
          pattern_library_page: PATTERN_LIBRARY_PAGE,
          pattern_library_source: PATTERN_LIBRARY_SOURCE,
          source_file: ex.sourceFile || PATTERN_LIBRARY_SOURCE,
          reference_url: ex.referenceUrl || PATTERN_LIBRARY_PAGE
        }
      : {
          gallery_root_url: GALLERY_URL,
          gallery_view_url: galleryUrl(col.title, ex.title),
          repo_url: GITHUB_REPO_URL,
          canonical_examples_list: EXAMPLES_LIST_URL,
          example_directory: sourceUrl(ex.pathname),
          example_index_file: sourceUrl(ex.pathname) + "/index.tsx"
        },
    likely_source_files: isPattern
      ? [ex.sourceFile || PATTERN_LIBRARY_SOURCE]
      : [
          ex.pathname + ".tsx", ex.pathname + ".ts", ex.pathname + "-solid.tsx",
          ex.pathname + ".svelte", ex.pathname + ".vue",
          ex.pathname + ".component.ts", ex.pathname + ".component.html", "data"
        ],
    links,
    implementation_languages: implementationLanguages,
    note: isPattern
      ? "Metadata derived from flipcard-pattern-library.html."
      : "Metadata derived from f5/unovis packages/shared/examples/examples-list.tsx."
  };
}

function buildFlipCardSurfaceSchema(meta, accent, views, ex) {
  return {
    component: "FlipCard",
    trigger: "click",
    flipHint: FLIP_HINT,
    accent: accent.solid,
    front: {
      title: meta.title,
      subtitle: meta.collection,
      path: meta.path_label,
      description: meta.description,
      links: meta.links
    },
    back: {
      default_view: "Metadata",
      available_views: views,
      copy_supported: true
    },
    schema_origin: ex.kind === "pattern" ? "pattern-library" : "unovis-gallery",
    minHeight: 380
  };
}

function buildAdaptiveTileSchema(meta) {
  const primaryLink = meta.links[0] || { label: "Open", url: GALLERY_URL };
  return {
    $schema: AC_SCHEMA_URL,
    type: "AdaptiveCard",
    version: AC_VERSION,
    metadata: {
      schema_variant: "adaptive-tile",
      source_kind: meta.kind,
      collection: meta.collection,
      pathname: meta.pathname
    },
    body: [
      { type: "TextBlock", text: meta.collection.toUpperCase(), size: "Small", weight: "Bolder", color: "Accent" },
      { type: "TextBlock", text: meta.title, size: "Large", weight: "Bolder", wrap: true, spacing: "Small" },
      { type: "TextBlock", text: meta.description, wrap: true, spacing: "Small" },
      {
        type: "FactSet",
        spacing: "Medium",
        facts: [
          { title: "Path", value: meta.path_label },
          { title: "Position", value: meta.ordinal_in_collection + " / " + meta.collection_size },
          { title: "Languages", value: meta.implementation_languages.join(", ") }
        ]
      }
    ],
    actions: [
      { type: "Action.OpenUrl", title: primaryLink.label, url: primaryLink.url }
    ]
  };
}

function buildAdaptiveLiveTileSchema(meta, ci, ei) {
  return {
    id: slugify(meta.collection + "-" + meta.title),
    type: "adaptive-livetile",
    version: "1.0",
    grid: liveTileGrid(ci, ei),
    content: {
      title: meta.title,
      subtitle: meta.collection,
      description: meta.description,
      metric: meta.ordinal_in_collection,
      total: meta.collection_size
    },
    bindings: {
      title: "${Topic.Title}",
      collection: "${Topic.Collection}",
      description: "${Topic.Description}",
      metric: "${Topic.Ordinal}",
      total: "${Topic.CollectionSize}",
      primaryUrl: "${Topic.PrimaryUrl}"
    },
    links: meta.links,
    note: "Every adaptive live tile now exposes the same additional schema views: metadata, source schema where available, FlipCard surface, adaptive tile, and adaptive live tile."
  };
}

function buildSourceSchemaOption(ex, meta) {
  if (typeof ex.sourceSchemaFactory === "function") return ex.sourceSchemaFactory(meta);
  if (ex.sourceSchema) {
    return optionShape(
      "source",
      ex.sourceSchemaLabel || "Source schema",
      ex.title + " -- source schema",
      ex.sourceSchemaSummary || "Source schema carried over from the pattern library.",
      ex.sourceSchema
    );
  }
  return null;
}

function buildSchemaOptions(col, ex, meta, accent, ci, ei) {
  const options = [
    optionShape("metadata", "Metadata", ex.title + " -- metadata", "Catalog metadata, source links, framework coverage, and path mapping for this card.", meta)
  ];
  const sourceOption = buildSourceSchemaOption(ex, meta);
  if (sourceOption) options.push(sourceOption);
  const viewLabels = options.map(o => o.label).concat(["FlipCard Surface", "Adaptive Tile", "Adaptive LiveTile"]);
  options.push(
    optionShape("flipcard", "FlipCard Surface", ex.title + " -- FlipCard surface", "Reusable flip surface contract with front/back content slots and explicit interaction state.", buildFlipCardSurfaceSchema(meta, accent, viewLabels, ex)),
    optionShape("adaptive-tile", "Adaptive Tile", ex.title + " -- adaptive tile", "Adaptive Card-backed tile option mirroring the richer tile surfaces shown in the pattern library.", buildAdaptiveTileSchema(meta)),
    optionShape("adaptive-livetile", "Adaptive LiveTile", ex.title + " -- adaptive livetile", "Dashboard-ready live tile option with shared additional schema views on every tile.", buildAdaptiveLiveTileSchema(meta, ci, ei))
  );
  return options;
}

function registerSchemaOptions(cardId, options) {
  CARD_SCHEMAS.set(cardId, options);
}

function getSchemaOption(cardId, key) {
  const options = CARD_SCHEMAS.get(cardId) || [];
  return options.find(o => o.key === key) || options[0] || null;
}

/* ── Render helpers ── */

function renderFilterChips() {
  const allChip = `<button type="button" class="filter-chip" data-collection-filter="All" aria-pressed="true"
    style="--chip-solid:#0284c7;--chip-soft:rgba(2,132,199,0.14)">All collections (${totalExamples()})</button>`;
  return allChip + COLLECTIONS.map((c, i) => {
    const a = PALETTE[i % PALETTE.length];
    return `<button type="button" class="filter-chip" data-collection-filter="${esc(c.title)}" aria-pressed="false"
      style="--chip-solid:${a.solid};--chip-soft:${a.soft}">${esc(c.title)} (${c.examples.length})</button>`;
  }).join("");
}

function positionPips(current, total) {
  let html = "";
  for (let i = 0; i < total; i++) {
    html += `<span class="position-pip${i === current ? " active" : ""}"></span>`;
  }
  return html;
}

function renderCard(col, ex, ci, ei) {
  const accent = PALETTE[ci % PALETTE.length];
  const meta = buildMetadata(col, ex, ci, ei);
  const cardId = "card-" + slugify(col.title) + "-" + slugify(ex.title) + "-" + ci + "-" + ei;
  const schemaOptions = buildSchemaOptions(col, ex, meta, accent, ci, ei);
  const initialOption = schemaOptions[0];
  const optionMarkup = schemaOptions.map(opt => `<option value="${esc(opt.key)}">${esc(opt.label)}</option>`).join("");
  const linksMarkup = meta.links.map(link => `<a class="card-link" href="${esc(link.url)}" target="_blank" rel="noreferrer">${esc(link.label)}</a>`).join("");
  const backLinksMarkup = meta.links.map(link => `<a class="back-link" href="${esc(link.url)}" target="_blank" rel="noreferrer">${esc(link.label)}</a>`).join("");
  registerSchemaOptions(cardId, schemaOptions);

  return `
  <div class="flip-card" tabindex="0" role="button" aria-pressed="false"
    aria-label="${esc(ex.title)} -- ${FLIP_HINT}"
    data-card-id="${esc(cardId)}" data-collection="${esc(col.title)}" data-title="${esc(ex.title)}" data-pathname="${esc(ex.pathname)}"
    style="--accent:${accent.solid};--accent-soft:${accent.soft}">
    <div class="flip-inner">
      <div class="flip-front">
        <div class="card-header">
          <div class="card-badge"><span>${ci+1}.${ei+1}</span><span>${esc(col.title)}</span></div>
          <span class="flip-hint">${esc(FLIP_HINT)}</span>
        </div>
        <div class="card-hero">${heroSvg(col.title, accent.solid)}</div>
        <div class="front-body">
          <h3 class="example-title">${esc(ex.title)}</h3>
          <span class="example-path">${esc(meta.path_label)}</span>
          <p style="margin:0;font-size:13px;color:var(--text-dim);line-height:1.5">${esc(ex.desc)}</p>
          <div class="meta-grid">
            <div class="meta-cell">
              <span class="meta-cell-label">Position</span>
              <div class="position-bar">${positionPips(ei, col.examples.length)}</div>
            </div>
            <div class="meta-cell">
              <span class="meta-cell-label">Source</span>
              <span class="meta-cell-value" style="font-size:11px;font-family:var(--font-mono)">${esc(meta.likely_source_files[0] || meta.path_label)}</span>
            </div>
          </div>
          <div class="lang-row">${meta.implementation_languages.map(l => `<span class="lang-badge">${esc(l)}</span>`).join("")}</div>
          <div class="link-row">${linksMarkup}</div>
        </div>
      </div>
      <div class="flip-back">
        <div class="card-header">
          <span class="back-title" data-schema-title>${esc(initialOption.title)}</span>
          <span class="flip-hint">Back face</span>
        </div>
        <div class="back-body">
          <div class="back-actions">${backLinksMarkup}</div>
          <div class="back-copy-row">
            <div class="schema-controls">
              <div class="schema-picker">
                <span class="schema-label">Schema view</span>
                <select class="schema-select" data-schema-select="${esc(cardId)}" aria-label="Schema view for ${esc(ex.title)}">${optionMarkup}</select>
              </div>
              <div class="schema-summary" data-schema-summary>${esc(initialOption.summary)}</div>
            </div>
            <button type="button" class="copy-btn" data-state="idle">Copy JSON</button>
          </div>
          <pre class="json-block" data-schema-json>${esc(prettyJson(initialOption.json))}</pre>
        </div>
      </div>
    </div>
  </div>`;
}

function renderCollection(col, index) {
  const accent = PALETTE[index % PALETTE.length];
  const cards = col.examples.map((ex, ei) => renderCard(col, ex, index, ei)).join("");
  const desc = col.description ? `<p class="collection-desc">${col.description}</p>` : "";
  return `
  <section class="collection" data-collection="${esc(col.title)}" style="--accent:${accent.solid};--accent-soft:${accent.soft}">
    <div class="collection-header">
      <div class="collection-title-wrap">
        <div class="collection-title"><span class="collection-marker"></span><h2>${esc(col.title)}</h2></div>
        ${desc}
      </div>
      <div class="collection-count">${col.examples.length} cards</div>
    </div>
    <div class="flip-grid">${cards}</div>
  </section>`;
}

function renderApp() {
  const tc = COLLECTIONS.length;
  const te = totalExamples();
  document.getElementById("app").innerHTML = `
  <div class="page">
    <header class="page-header">
      <div class="title-block">
        <h1>Unovis Gallery Flipcards and Pattern Library</h1>
        <p class="subtitle">
          One adaptive flipcard for every example in the <a href="${esc(GALLERY_URL)}" target="_blank" rel="noreferrer">Unovis visualization gallery</a>,
          plus every flipcard surface cataloged in <a href="${esc(PATTERN_LIBRARY_PAGE)}" target="_blank" rel="noreferrer">flipcard-pattern-library.html</a>.
          Back faces now expose switchable schema views, including the same additional schema options on every adaptive live tile.
        </p>
        <div class="source-line">
          Canonical sources:
          <a href="${esc(EXAMPLES_LIST_URL)}" target="_blank" rel="noreferrer">packages/shared/examples/examples-list.tsx</a>
          and
          <a href="${esc(PATTERN_LIBRARY_PAGE)}" target="_blank" rel="noreferrer">flipcard-pattern-library.html</a>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span class="stat-value" id="stat-visible-collections">${tc}</span><span class="stat-label">Visible collections</span></div>
        <div class="stat"><span class="stat-value">${tc}</span><span class="stat-label">Total collections</span></div>
        <div class="stat"><span class="stat-value" id="stat-visible-cards">${te}</span><span class="stat-label">Visible cards</span></div>
        <div class="stat"><span class="stat-value">${te}</span><span class="stat-label">Total cards</span></div>
      </div>
      <section class="controls" aria-label="Filters">
        <div class="controls-row">
          <input class="search" id="searchInput" type="search" spellcheck="false"
            placeholder="Search by title, collection, or pathname" value="${esc(STATE.query)}" aria-label="Search cards">
          <div class="search-help">Filter ${te} cards instantly.</div>
        </div>
        <div class="chip-bar" id="filterBar">${renderFilterChips()}</div>
      </section>
    </header>
    <main class="collections">${COLLECTIONS.map((c, i) => renderCollection(c, i)).join("")}</main>
    <section class="empty-state hidden" id="emptyState">No cards match the current search and collection filter.</section>
    <footer class="page-footer">
      Self-contained adaptive flipcards with switchable schema views. All illustrations are inline SVG -- zero external image dependencies.
      Data is sourced from the <code>f5/unovis</code> canonical examples list and the local flipcard pattern library.
    </footer>
  </div>`;
}

/* ── Interaction ── */

function applyFilters() {
  const q = STATE.query.trim().toLowerCase();
  let vc = 0, vk = 0;
  document.querySelectorAll(".collection").forEach(sec => {
    const sc = sec.dataset.collection || "";
    const cm = STATE.collection === "All" || STATE.collection === sc;
    let sv = 0;
    sec.querySelectorAll(".flip-card").forEach(card => {
      const hay = [card.dataset.collection||"", card.dataset.title||"", card.dataset.pathname||""].join(" ").toLowerCase();
      const vis = cm && (q === "" || hay.includes(q));
      card.classList.toggle("hidden", !vis);
      if (vis) { sv++; vk++; }
    });
    sec.classList.toggle("hidden", sv === 0);
    if (sv > 0) vc++;
  });
  document.getElementById("stat-visible-collections").textContent = String(vc);
  document.getElementById("stat-visible-cards").textContent = String(vk);
  document.getElementById("emptyState").classList.toggle("hidden", vk !== 0);
}

function syncFilterChips() {
  document.querySelectorAll("[data-collection-filter]").forEach(c => {
    c.setAttribute("aria-pressed", c.dataset.collectionFilter === STATE.collection ? "true" : "false");
  });
}

function toggleCard(card) {
  card.setAttribute("aria-pressed", String(card.getAttribute("aria-pressed") !== "true"));
}

function updateSchemaView(card, key) {
  const cardId = card.dataset.cardId;
  const option = getSchemaOption(cardId, key);
  if (!option) return;
  const title = card.querySelector("[data-schema-title]");
  const summary = card.querySelector("[data-schema-summary]");
  const json = card.querySelector("[data-schema-json]");
  if (title) title.textContent = option.title;
  if (summary) summary.textContent = option.summary;
  if (json) json.textContent = prettyJson(option.json);
}

async function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); return; }
  const ta = document.createElement("textarea");
  ta.value = text; ta.setAttribute("readonly",""); ta.style.cssText = "position:fixed;opacity:0;pointer-events:none";
  document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
}

function bindEvents() {
  document.addEventListener("input", e => { if (e.target.id === "searchInput") { STATE.query = e.target.value || ""; applyFilters(); } });
  document.addEventListener("change", e => {
    const select = e.target.closest("[data-schema-select]");
    if (!select) return;
    const card = select.closest(".flip-card");
    if (!card) return;
    updateSchemaView(card, select.value);
  });
  document.addEventListener("click", async e => {
    const fc = e.target.closest("[data-collection-filter]");
    if (fc) { STATE.collection = fc.dataset.collectionFilter; syncFilterChips(); applyFilters(); return; }
    if (e.target.closest("a")) { e.stopPropagation(); return; }
    if (e.target.closest("select")) { e.stopPropagation(); return; }
    const cb = e.target.closest(".copy-btn");
    if (cb) {
      e.stopPropagation();
      const pre = cb.closest(".flip-back").querySelector("[data-schema-json]");
      if (!pre) return;
      try { await copyText(pre.textContent); cb.dataset.state="copied"; cb.textContent="Copied"; setTimeout(()=>{cb.dataset.state="idle";cb.textContent="Copy JSON";},1200); }
      catch(_) { cb.textContent="Failed"; setTimeout(()=>{cb.textContent="Copy JSON";},1200); }
      return;
    }
    const card = e.target.closest(".flip-card");
    if (card) toggleCard(card);
  });
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter" && e.key !== " ") return;
    const card = e.target.closest(".flip-card");
    if (!card || e.target !== card) return;
    e.preventDefault(); toggleCard(card);
  });
}

(function init() {
  renderApp();
  syncFilterChips();
  bindEvents();
  applyFilters();
})();
</script>
</body>
</html>
